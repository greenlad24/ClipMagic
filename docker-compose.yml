# ClipMagic — single-droplet deployment.
#
# One service does everything (upload → store → render → bulk → serve UI),
# which is the whole point: no Rendi, no R2, no external DB. Just:
#
#   docker compose up -d --build
#
# then open http://<droplet-ip>:8080
services:
  clipmagic:
    # Both public ports now run the LAB codebase (lab/ is the real product).
    # :8080 builds from lab/ just like :9090 does, but keeps its OWN production
    # data volume (clipmagic-data) below and stays on port 8080. The original
    # root app (./src, ./web, ./server) is no longer built/served — edit lab/.
    build:
      context: ./lab
      dockerfile: Dockerfile
    image: clipmagic:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    # Load EVERY key/value from .env straight into the container. This means new
    # keys (GROQ_API_KEY, ANTHROPIC_API_KEY, PEXELS_API_KEY, …) only need to be
    # added to .env — never hand-edited into this file — so `git pull` never
    # conflicts. The explicit `environment:` entries below still win for the few
    # that have computed defaults.
    env_file:
      - .env
    environment:
      PORT: "8080"
      DATA_DIR: /data
      # Parallel FFmpeg renders. Default = vCPU count. For a 4 vCPU droplet, 4
      # is a good start; raise cautiously (FFmpeg is already multi-threaded).
      RENDER_CONCURRENCY: ${RENDER_CONCURRENCY:-4}
      # 0 = unlimited upload size (removes the old 25MB cap). Or set a ceiling
      # in bytes, e.g. 10737418240 for 10GB.
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-0}
      # Set a secret to require Authorization: Bearer <token> on the API.
      API_TOKEN: ${API_TOKEN:-}
      # Public origin used to build absolute output URLs (set in production).
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      # OpenAI (transcription + AI director) and Kinovi (shot capture). Set
      # these in .env to enable the AI pipeline; the app runs without them.
      ZITE_OPENAI_ACCESS_TOKEN: ${ZITE_OPENAI_ACCESS_TOKEN:-}
      ZITE_KINOVI_API_KEY: ${ZITE_KINOVI_API_KEY:-}
      # Pexels stock-footage source for situational b-roll (free; get a key at
      # https://www.pexels.com/api/). Without it, situational beats fall back to
      # AI generation. Set PEXELS_API_KEY in .env (same as the keys above).
      PEXELS_API_KEY: ${PEXELS_API_KEY:-}
    volumes:
      # Persist all media + the database on the host (or a mounted DO volume).
      - clipmagic-data:/data

  # ── LAB: the product-improver's parallel app ──────────────────────────────
  # A second, fully separate ClipMagic built from lab/ (its own code + image).
  # It reads the EXACT SAME keys as the main app (same `env_file: .env`), so it
  # "calls them like the main version" — but runs on :9090 with its OWN data
  # volume, so it can never touch the main app's media or database.
  #
  # Opt-in via a profile so a plain `docker compose up -d` only starts the main
  # app. To run the lab on the server (with the same keys):
  #   docker compose --profile lab up -d --build clipmagic-lab
  #   then open http://<host>:9090
  clipmagic-lab:
    profiles: ["lab"]
    build:
      context: ./lab
      dockerfile: Dockerfile
    image: clipmagic-lab:latest
    restart: unless-stopped
    ports:
      - "9090:9090"
    # Same keys as the main app — single source of truth, no duplication.
    env_file:
      - .env
    environment:
      PORT: "9090"
      DATA_DIR: /data
      RENDER_CONCURRENCY: ${RENDER_CONCURRENCY:-4}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-0}
      API_TOKEN: ${API_TOKEN:-}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      ZITE_OPENAI_ACCESS_TOKEN: ${ZITE_OPENAI_ACCESS_TOKEN:-}
      ZITE_KINOVI_API_KEY: ${ZITE_KINOVI_API_KEY:-}
      PEXELS_API_KEY: ${PEXELS_API_KEY:-}
      # Reaction-sticker libraries for the lab's Sticker Shorts editor (both FREE;
      # same keys as the main app via the shared .env). The lab's default sticker
      # source is Giphy + Tenor static reaction stickers + an AI fit-review.
      GIPHY_API_KEY: ${GIPHY_API_KEY:-}
      TENOR_API_KEY: ${TENOR_API_KEY:-}
    volumes:
      # SEPARATE volume — the lab's media + database never mix with the main app.
      - clipmagic-lab-data:/data
      # Postiz Settings page (write-only key manager) writes the user's Postiz
      # keys to /postiz-config/postiz.env on this SHARED volume; the postiz
      # service mounts the same volume at /config and SOURCES that file at
      # startup (see the postiz `entrypoint` below), so keys saved in the suite
      # apply to Postiz with a one-click restart.
      - postiz-config:/postiz-config
      # Docker socket — lets the suite restart ONLY the Postiz container (found by
      # its compose-service label) over the Docker Engine API so saved keys take
      # effect in one click. NOTE: this is a real privilege (the suite can manage
      # containers); it's an accepted tradeoff for one-click apply. Used solely to
      # restart Postiz. Remove this mount to disable auto-restart (keys still
      # persist; restart Postiz manually on the server instead).
      - /var/run/docker.sock:/var/run/docker.sock

  # ── POSTIZ: self-hosted social-media scheduler (opt-in) ───────────────────
  # The open-source social poster (gitroomhq/postiz-app) that the hub's "Social
  # poster" tile links to. It's a SEPARATE app — its own container on its own
  # port, backed by its own Postgres + Redis — so it's gated behind the `postiz`
  # profile (mirroring `clipmagic-lab`'s `profiles: ["lab"]`). A plain
  # `docker compose up -d` never starts it, and deploy.sh leaves it alone:
  # it's heavy (app + Postgres + Redis) for a 4-vCPU/8GB box, so start it
  # manually only when you want it:
  #
  #   docker compose --profile postiz up -d
  #   then open http://<host>:5000   (the hub tile finds it via POSTIZ_URL/PORT)
  #
  # All secrets come from the shared root .env — see lab/POSTIZ.md for the full
  # list (JWT_SECRET, Postgres creds, the URLs, and per-platform OAuth keys).
  postiz:
    profiles: ["postiz"]
    image: ghcr.io/gitroomhq/postiz-app:latest
    restart: unless-stopped
    # Source the suite-managed key file LAST, then run the image's ORIGINAL
    # startup command. The official postiz-app image declares NO ENTRYPOINT and
    # CMD ["sh","-c","nginx && pnpm run pm2"] (see gitroomhq/postiz-app
    # Dockerfile). We wrap that command: `set -a` so sourced vars are exported,
    # source /config/postiz.env if present (written by the suite's Postiz
    # Settings page on the shared `postiz-config` volume), then `exec` the
    # original `nginx && pnpm run pm2`. Because the file is sourced AFTER the
    # compose `environment:` defaults below are already in the process env, its
    # values OVERRIDE those defaults. A plain restart re-runs this entrypoint and
    # re-sources the (possibly updated) file, so new keys apply on restart.
    entrypoint:
      - /bin/sh
      - -lc
      - 'set -a; [ -f /config/postiz.env ] && . /config/postiz.env; set +a; exec sh -c "nginx && pnpm run pm2"'
    ports:
      # Host port → Postiz's internal port (the unified app image serves on
      # 5000). Override the host side with POSTIZ_PORT in .env; keep it in sync
      # with the URLs below.
      - "${POSTIZ_PORT:-5000}:5000"
    environment:
      # Public-facing origin (where the browser reaches Postiz). For a bare IP
      # box the default works; behind a domain/proxy set POSTIZ_URL in .env.
      MAIN_URL: ${POSTIZ_URL:-http://localhost:5000}
      FRONTEND_URL: ${POSTIZ_URL:-http://localhost:5000}
      NEXT_PUBLIC_BACKEND_URL: ${POSTIZ_URL:-http://localhost:5000}/api
      # Internal backend address inside the container (Postiz runs both on one
      # image); this is fixed and not host-dependent.
      BACKEND_INTERNAL_URL: http://localhost:3000
      # Required: a long random string, unique per install. Set in .env.
      JWT_SECRET: ${POSTIZ_JWT_SECRET:-}
      # Datastores (point at the sibling containers on the compose network).
      DATABASE_URL: postgresql://${POSTIZ_POSTGRES_USER:-postiz}:${POSTIZ_POSTGRES_PASSWORD:-postiz-password}@postiz-postgres:5432/${POSTIZ_POSTGRES_DB:-postiz}
      REDIS_URL: redis://postiz-redis:6379
      # Temporal workflow engine. Postiz v2.12+ uses Temporal for all async work
      # (scheduling/posting) and the backend EXITS on boot if it can't reach it
      # (ECONNREFUSED on the default localhost:7233). Point it at the sibling
      # Temporal container on the compose network.
      TEMPORAL_ADDRESS: postiz-temporal:7233
      TEMPORAL_NAMESPACE: default
      # Local disk storage for uploaded media (no external object store needed).
      STORAGE_PROVIDER: local
      UPLOAD_DIRECTORY: /uploads
      NEXT_PUBLIC_UPLOAD_DIRECTORY: /uploads
      # Required for the self-hosted (non-cloud) build.
      IS_GENERAL: "true"
      DISABLE_REGISTRATION: ${POSTIZ_DISABLE_REGISTRATION:-false}
      # Allow the auth cookie over plain HTTP. In production mode Postiz marks the
      # session cookie `Secure`, so browsers DROP it on http:// — login appears to
      # succeed but bounces straight back to /auth. Defaults to true for the bare-IP
      # http deployment; set POSTIZ_NOT_SECURED=false in .env once Postiz is behind
      # HTTPS (a domain + reverse proxy) so the cookie is properly secured again.
      NOT_SECURED: ${POSTIZ_NOT_SECURED:-true}
      # ── Per-platform OAuth app credentials ─────────────────────────────────
      # Empty by default (like the main app's keys). Fill in .env only for the
      # networks you want to connect; see lab/POSTIZ.md + docs.postiz.com.
      X_API_KEY: ${X_API_KEY:-}
      X_API_SECRET: ${X_API_SECRET:-}
      LINKEDIN_CLIENT_ID: ${LINKEDIN_CLIENT_ID:-}
      LINKEDIN_CLIENT_SECRET: ${LINKEDIN_CLIENT_SECRET:-}
      REDDIT_CLIENT_ID: ${REDDIT_CLIENT_ID:-}
      REDDIT_CLIENT_SECRET: ${REDDIT_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      FACEBOOK_APP_ID: ${FACEBOOK_APP_ID:-}
      FACEBOOK_APP_SECRET: ${FACEBOOK_APP_SECRET:-}
      YOUTUBE_CLIENT_ID: ${YOUTUBE_CLIENT_ID:-}
      YOUTUBE_CLIENT_SECRET: ${YOUTUBE_CLIENT_SECRET:-}
      TIKTOK_CLIENT_ID: ${TIKTOK_CLIENT_ID:-}
      TIKTOK_CLIENT_SECRET: ${TIKTOK_CLIENT_SECRET:-}
      PINTEREST_CLIENT_ID: ${PINTEREST_CLIENT_ID:-}
      PINTEREST_CLIENT_SECRET: ${PINTEREST_CLIENT_SECRET:-}
      THREADS_APP_ID: ${THREADS_APP_ID:-}
      THREADS_APP_SECRET: ${THREADS_APP_SECRET:-}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID:-}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET:-}
      SLACK_ID: ${SLACK_ID:-}
      SLACK_SECRET: ${SLACK_SECRET:-}
      MASTODON_CLIENT_ID: ${MASTODON_CLIENT_ID:-}
      MASTODON_CLIENT_SECRET: ${MASTODON_CLIENT_SECRET:-}
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN:-}
    volumes:
      - postiz-uploads:/uploads
      - postiz-config:/config
    depends_on:
      postiz-postgres:
        condition: service_healthy
      postiz-redis:
        condition: service_healthy
      postiz-temporal:
        condition: service_healthy

  postiz-postgres:
    profiles: ["postiz"]
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTIZ_POSTGRES_USER:-postiz}
      POSTGRES_PASSWORD: ${POSTIZ_POSTGRES_PASSWORD:-postiz-password}
      POSTGRES_DB: ${POSTIZ_POSTGRES_DB:-postiz}
    volumes:
      - postiz-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTIZ_POSTGRES_USER:-postiz} -d ${POSTIZ_POSTGRES_DB:-postiz}"]
      interval: 10s
      timeout: 5s
      retries: 5

  postiz-redis:
    profiles: ["postiz"]
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - postiz-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── TEMPORAL: workflow engine required by Postiz v2.12+ ───────────────────
  # Postiz moved its queue/scheduling onto Temporal; without it the backend
  # crashes on boot (connect ECONNREFUSED 7233) → 502 from Postiz's nginx.
  # `auto-setup` runs the whole single-binary Temporal server AND provisions its
  # SQL schema + the `default` namespace on first boot. We back it with a small
  # dedicated Postgres for persistence AND Elasticsearch for visibility:
  # Postiz's backend registers MORE THAN 3 Text-type custom search attributes on
  # boot, which Temporal's standard (SQL) visibility forbids ("cannot have more
  # than 3 search attribute of type Text"). Advanced (ES) visibility lifts that
  # limit, so ES is REQUIRED for the backend to start — not optional.
  postiz-temporal:
    profiles: ["postiz"]
    image: temporalio/auto-setup:1.28.1
    restart: unless-stopped
    environment:
      DB: postgres12
      DB_PORT: "5432"
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: postiz-temporal-postgres
      # Advanced visibility via Elasticsearch (required — see comment above).
      ENABLE_ES: "true"
      ES_SEEDS: postiz-temporal-elasticsearch
      ES_VERSION: v7
    depends_on:
      postiz-temporal-postgres:
        condition: service_healthy
      postiz-temporal-elasticsearch:
        condition: service_healthy
    healthcheck:
      # auto-setup binds the frontend to the CONTAINER's IP (not 127.0.0.1), so
      # probe via the container's own hostname — the same address Temporal
      # advertises and that Postiz reaches as postiz-temporal:7233. (tctl prints a
      # deprecation notice to stderr; we only care that the frontend is SERVING.)
      test: ["CMD-SHELL", "tctl --address \"$(hostname):7233\" cluster health 2>/dev/null | grep -q SERVING"]
      interval: 10s
      timeout: 10s
      retries: 18
      start_period: 60s

  postiz-temporal-postgres:
    profiles: ["postiz"]
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      # auto-setup creates the `temporal` + `temporal_visibility` DBs itself, so
      # we only need the role/instance here.
      POSTGRES_DB: temporal
    volumes:
      - postiz-temporal-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Elasticsearch for Temporal's advanced visibility (single-node, tiny heap).
  # 256MB heap keeps it to ~0.6-1GB RSS, well within the box's headroom. The
  # disk-watermark overrides stop ES going read-only on a fairly full disk.
  postiz-temporal-elasticsearch:
    profiles: ["postiz"]
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.9
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms256m -Xmx256m
      - cluster.routing.allocation.disk.threshold_enabled=true
      - cluster.routing.allocation.disk.watermark.low=512mb
      - cluster.routing.allocation.disk.watermark.high=256mb
      - cluster.routing.allocation.disk.watermark.flood_stage=128mb
    volumes:
      - postiz-temporal-es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health 2>/dev/null | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # ── CADDY: automatic-HTTPS reverse proxy for Postiz ───────────────────────
  # Social-platform OAuth (connecting TikTok/Instagram/YouTube) requires Postiz
  # to be served over https:// on a real domain — providers reject bare-IP http
  # callbacks. Caddy terminates TLS on 80/443 and proxies to postiz:5000 on the
  # internal network, fetching+renewing Let's Encrypt certs automatically (stored
  # in the caddy-data volume). It's in its OWN `caddy` profile so the plain-http
  # path is unaffected; start it alongside Postiz once your domain's DNS A record
  # points here and ports 80+443 are open:
  #
  #   POSTIZ_DOMAIN=social.example.com  (in .env)
  #   docker compose --profile postiz --profile caddy up -d
  #
  # Then set the Postiz Public URL to https://<POSTIZ_DOMAIN> and POSTIZ_NOT_SECURED=false.
  caddy:
    profiles: ["caddy"]
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      POSTIZ_DOMAIN: ${POSTIZ_DOMAIN:?Set POSTIZ_DOMAIN in .env to your Postiz domain, e.g. social.example.com}
      LAB_DOMAIN: ${LAB_DOMAIN:-}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  clipmagic-data:
  clipmagic-lab-data:
  postiz-uploads:
  postiz-config:
  postiz-postgres-data:
  postiz-redis-data:
  postiz-temporal-postgres-data:
  postiz-temporal-es-data:
  caddy-data:
  caddy-config:
